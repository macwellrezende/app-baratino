<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baratino FC</title>
    <!-- Tailwind CSS v4 -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .bg-marinho-deep { background-color: #07111E; }
        .bg-marinho-card { background-color: #0E1E33; }
        .border-marinho-light { border-color: #1A314D; }
        .text-marinho-light { color: #94A3B8; }
    </style>
</head>
<body class="bg-marinho-deep text-white font-sans min-h-screen flex flex-col max-w-md mx-auto shadow-2xl border-x border-marinho-light">

    <!-- HEADER -->
    <header class="bg-marinho-card p-4 text-center border-b border-marinho-light sticky top-0 z-50 flex justify-between items-center">
        <div class="flex items-center space-x-2">
            <div class="w-7 h-7 rounded-full border-2 border-white flex items-center justify-center font-bold text-xs">B</div>
            <h1 class="text-lg font-black tracking-widest text-white">BARATINO FC</h1>
        </div>
        <button id="btn-logout" class="hidden text-xs bg-red-600/80 hover:bg-red-600 px-3 py-1.5 rounded font-medium transition">Sair</button>
    </header>

    <!-- TELA LOGIN -->
    <main id="tela-login" class="flex-1 flex flex-col justify-center p-8 space-y-8">
        <div class="text-center space-y-4">
            <div class="mx-auto w-36 h-36 bg-white rounded-full border-4 border-marinho-light flex items-center justify-center p-3 shadow-2xl overflow-hidden">
                <img src="escudo.png" onerror="this.src='Fundo Branco - Brasão BFC.png'" alt="Escudo Baratino FC" class="w-full h-full object-contain">
            </div>
            <div class="space-y-1">
                <h2 class="text-2xl font-bold tracking-tight">Área do Atleta</h2>
                <p class="text-marinho-light text-sm">Digite seu e-mail para acessar o painel do clube.</p>
            </div>
        </div>
        <form id="form-login" class="space-y-4">
            <input type="email" id="login-email" required placeholder="seuemail@baba.com" class="w-full bg-marinho-card border border-marinho-light rounded-lg p-3.5 text-white placeholder-gray-500 focus:outline-none focus:border-white transition">
            <div id="login-feedback" class="hidden text-sm p-3 rounded-lg text-center font-medium"></div>
            <button type="submit" id="btn-entrar" class="w-full bg-white hover:bg-gray-100 text-gray-900 font-bold p-3.5 rounded-lg transition duration-200 shadow-md cursor-pointer">Entrar no Aplicativo</button>
        </form>
    </main>

    <!-- TELA PRINCIPAL -->
    <main id="tela-principal" class="hidden flex-1 p-5 space-y-6 overflow-y-auto mb-16">
        
        <section id="aba-jogadores" class="space-y-4">
            <h2 class="text-xl font-bold border-b border-marinho-light pb-2">⚽ Artilharia & Elenco</h2>
            <div id="lista-jogadores" class="space-y-2"></div>
        </section>

        <section id="aba-financeiro" class="hidden space-y-4">
            <h2 class="text-xl font-bold border-b border-marinho-light pb-2">💰 Meu Financeiro</h2>
            <div id="painel-financeiro" class="space-y-3"></div>
        </section>

        <section id="aba-presenca" class="hidden space-y-4">
            <h2 class="text-xl font-bold border-b border-marinho-light pb-2">📋 Confirmar Presença</h2>
            <button id="btn-admin-reset" class="hidden w-full bg-red-600/20 text-red-400 border border-red-500/30 font-bold p-3 rounded-lg text-xs uppercase tracking-wider cursor-pointer mb-2">🧹 Limpar Lista da Semana</button>
            <div id="acoes-presenca" class="flex gap-3">
                <button id="btn-vou" class="flex-1 bg-marinho-card border border-marinho-light text-white font-bold py-3.5 rounded-lg transition cursor-pointer">Vou Pro Jogo</button>
                <button id="btn-naovou" class="flex-1 bg-marinho-card border border-marinho-light text-white font-bold py-3.5 rounded-lg transition cursor-pointer">Desfalque</button>
            </div>
            <div id="bloco-convidado" class="bg-marinho-card border border-marinho-light rounded-xl p-3.5 space-y-2 hidden">
                <p class="text-xs font-bold text-white/80 uppercase tracking-wider">➕ Levar Convidado</p>
                <div class="flex gap-2">
                    <input type="text" id="input-convidado" placeholder="Nome" class="flex-1 bg-marinho-deep border border-marinho-light rounded-lg p-2 text-sm text-white">
                    <button id="btn-add-convidado" class="bg-white text-gray-950 px-4 py-2 rounded-lg text-xs font-black cursor-pointer">Incluir</button>
                </div>
            </div>
            <div id="painel-lista-presenca" class="space-y-4 pt-2"></div>
        </section>

        <section id="aba-votacao" class="hidden space-y-4">
            <h2 class="text-xl font-bold border-b border-marinho-light pb-2">🔥 Votação do Baba</h2>
            <div class="bg-marinho-card border border-marinho-light rounded-xl p-5 text-center">
                <p class="text-sm text-marinho-light">A votação secreta estará disponível após o jogo.</p>
            </div>
        </section>
    </main>

    <nav id="menu-inferior" class="hidden bg-marinho-card border-t border-marinho-light fixed bottom-0 left-0 right-0 max-w-md mx-auto flex justify-around p-2 text-center text-[11px] text-marinho-light z-50">
        <button id="btn-aba-jogadores" class="flex-1 py-1.5 text-white font-bold">⚽<br>Artilharia</button>
        <button id="btn-aba-financeiro" class="flex-1 py-1.5 transition hover:text-white">💰<br>Finanças</button>
        <button id="btn-aba-presenca" class="flex-1 py-1.5 transition hover:text-white">📋<br>Presença</button>
        <button id="btn-aba-votacao" class="flex-1 py-1.5 transition hover:text-white">🔥<br>Votação</button>
    </nav>

    <script>
        const SUPABASE_URL = "https://menkdxhnzshtdkxsjeoe.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_499H1fxIAJ9bmcwksN9jZg_gRuPzwhQ";
        const ADMIN_EMAIL = "macwellrezende@hotmail.com";
        const dbClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        let SampleLogado = null;

        function verificarJanelaLista() {
            const dataBrasilia = new Date(new Date().toLocaleString("en-US", {timeZone: "America/Bahia"}));
            const diaSemana = dataBrasilia.getDay(); 
            const hora = dataBrasilia.getHours();
            let aberta = false;
            if (diaSemana === 3 && hora >= 5) aberta = true; 
            if (diaSemana === 4) aberta = true; 
            if (diaSemana === 5 && hora < 22) aberta = true; 
            return aberta;
        }

        async function carregarListaPresenca() {
            const container = document.getElementById('painel-lista-presenca');
            const blocoConvidado = document.getElementById('bloco-convidado');
            
            try {
                const { data: jogadores } = await dbClient.from('jogadores').select('*').order('nome', { ascending: true });
                const { data: convidados } = await dbClient.from('convidados').select('nome, jogador_id, jogadores(nome)');

                const associados = jogadores.filter(j => j.presenca === 'Confirmado' && j.categoria !== 'Goleiro');
                const goleiros = jogadores.filter(j => j.presenca === 'Confirmado' && j.categoria === 'Goleiro');
                const desfalques = jogadores.filter(j => j.presenca === 'Dispensado');
                const semResposta = jogadores.filter(j => j.presenca !== 'Confirmado' && j.presenca !== 'Dispensado');

                if (SampleLogado && SampleLogado.presenca === 'Confirmado') blocoConvidado.classList.remove('hidden');
                else blocoConvidado.classList.add('hidden');

                container.innerHTML = `
                    <div class="bg-marinho-card border border-marinho-light rounded-xl p-4 space-y-2">
                        <p class="text-xs font-bold text-green-400">✅ Confirmados (${associados.length + (convidados?.length || 0)})</p>
                        <p class="text-sm">${associados.map(j => j.nome).join(', ')}</p>
                        ${convidados?.length > 0 ? `<p class="text-xs text-yellow-400 pt-2">Convidados: ${convidados.map(c => c.nome + ' (' + c.jogadores.nome + ')').join(', ')}</p>` : ''}
                    </div>
                    <div class="bg-marinho-card border border-marinho-light rounded-xl p-4 space-y-2">
                        <p class="text-xs font-bold text-cyan-400">🧤 Goleiros (${goleiros.length})</p>
                        <p class="text-sm">${goleiros.map(j => j.nome).join(', ') || 'Nenhum'}</p>
                    </div>
                `;
            } catch (err) { console.error("Erro na lista:", err); }
        }

        async function registrarPresenca(status) {
            if (!SampleLogado) return;
            try {
                await dbClient.from('jogadores').update({ presenca: status }).eq('id', SampleLogado.id);
                if (status === 'Dispensado') await dbClient.from('convidados').delete().eq('jogador_id', SampleLogado.id);
                carregarListaPresenca();
            } catch (err) { console.error("Erro ao registrar:", err); }
        }

        document.getElementById('btn-vou').addEventListener('click', () => registrarPresenca('Confirmado'));
        document.getElementById('btn-naovou').addEventListener('click', () => registrarPresenca('Dispensado'));
        
        // ... (resto das funções de navegação e login permanecem iguais)
    </script>
</body>
</html>
