<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baratino FC - Painel Oficial Completo</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .bg-marinho-deep { background-color: #07111E; }
        .bg-marinho-card { background-color: #0E1E33; }
        .border-marinho-light { border-color: #1A314D; }
        .text-marinho-light { color: #94A3B8; }
    </style>
</head>
<body class="bg-marinho-deep text-white font-sans min-h-screen flex flex-col max-w-md mx-auto shadow-2xl border-x border-marinho-light">

    <header class="bg-marinho-card p-4 text-center border-b border-marinho-light sticky top-0 z-50 flex justify-between items-center">
        <h1 class="text-lg font-black tracking-widest text-white">BARATINO FC</h1>
        <button id="btn-logout" class="hidden text-xs bg-red-600/80 px-3 py-1.5 rounded">Sair</button>
    </header>

    <main id="tela-login" class="flex-1 flex flex-col justify-center p-8 space-y-8">
        <form id="form-login" class="space-y-4">
            <input type="email" id="login-email" required placeholder="seuemail@gmail.com" class="w-full bg-marinho-card border border-marinho-light rounded-lg p-3.5 text-white">
            <button type="submit" id="btn-entrar" class="w-full bg-white text-gray-900 font-bold p-3.5 rounded-lg">Entrar</button>
        </form>
    </main>

    <main id="tela-principal" class="hidden flex-1 p-5 space-y-6 overflow-y-auto mb-16">
        
        <section id="aba-jogadores" class="space-y-4">
            <h2 class="text-xl font-bold border-b border-marinho-light pb-2">⚽ Artilharia</h2>
            <div id="lista-jogadores" class="space-y-2"></div>
        </section>

        <section id="aba-financeiro" class="hidden space-y-4">
            <h2 class="text-xl font-bold border-b border-marinho-light pb-2">💰 Financeiro</h2>
            <div id="painel-financeiro" class="space-y-3"></div>
        </section>

        <section id="aba-presenca" class="hidden space-y-4">
            <h2 class="text-xl font-bold border-b border-marinho-light pb-2">📋 Presença</h2>
            
            <div id="painel-controle-admin" class="hidden bg-marinho-card border border-red-500/30 rounded-xl p-4 space-y-3">
                <p class="text-xs font-black text-red-400 uppercase">⚙️ Painel Admin</p>
                <select id="admin-select-jogador" class="w-full bg-marinho-deep border border-marinho-light rounded-lg p-2 text-xs"></select>
                <div class="flex gap-2">
                    <button onclick="forcarStatus('Confirmado')" class="flex-1 bg-green-600 p-2 rounded text-xs font-bold">Vou (Forçar)</button>
                    <button onclick="forcarStatus('Dispensado')" class="flex-1 bg-red-600 p-2 rounded text-xs font-bold">Desfalque (Forçar)</button>
                </div>
                <input type="text" id="admin-novo-nome" placeholder="Novo Atleta" class="w-full bg-marinho-deep p-2 text-xs border border-marinho-light rounded-lg">
                <input type="email" id="admin-novo-email" placeholder="E-mail" class="w-full bg-marinho-deep p-2 text-xs border border-marinho-light rounded-lg">
                <button id="btn-admin-add-jogador" class="w-full bg-white text-black p-2 rounded text-xs font-bold">Cadastrar Jogador</button>
                <button id="btn-admin-reset" class="w-full bg-red-600/20 text-red-400 p-2 rounded text-xs font-bold uppercase">🧹 Limpar Lista</button>
            </div>

            <div class="flex gap-3">
                <button id="btn-vou" class="flex-1 bg-green-600 font-bold py-3.5 rounded-lg">Vou Pro Jogo</button>
                <button id="btn-naovou" class="flex-1 bg-red-600 font-bold py-3.5 rounded-lg">Desfalque</button>
            </div>
            
            <div id="bloco-convidado" class="bg-marinho-card border border-marinho-light rounded-xl p-3.5 space-y-2 hidden">
                <input type="text" id="input-convidado" placeholder="Nome do convidado" class="w-full bg-marinho-deep p-2 rounded-lg text-sm">
                <button id="btn-add-convidado" class="w-full bg-white text-black font-bold p-2 rounded-lg text-xs">Incluir Convidado</button>
            </div>
            <div id="painel-lista-presenca" class="space-y-4 pt-2"></div>
        </section>

        <section id="aba-votacao" class="hidden space-y-4">
            <h2 class="text-xl font-bold border-b border-marinho-light pb-2">🔥 Votação</h2>
            <div class="bg-marinho-card p-5 text-center">Em breve.</div>
        </section>
    </main>

    <nav id="menu-inferior" class="hidden bg-marinho-card border-t border-marinho-light fixed bottom-0 left-0 right-0 max-w-md mx-auto flex justify-around p-2 text-center text-[11px] text-marinho-light z-50">
        <button id="btn-aba-jogadores" class="flex-1 py-1.5 text-white font-bold">⚽<br>Artilharia</button>
        <button id="btn-aba-financeiro" class="flex-1 py-1.5">💰<br>Finanças</button>
        <button id="btn-aba-presenca" class="flex-1 py-1.5">📋<br>Presença</button>
        <button id="btn-aba-votacao" class="flex-1 py-1.5">🔥<br>Votação</button>
    </nav>

    <script>
        const db = supabase.createClient("https://menkdxhnzshtdkxsjeoe.supabase.co", "sb_publishable_499H1fxIAJ9bmcwksN9jZg_gRuPzwhQ");
        let Logado = null;
        const ADMIN_EMAIL = "macwellrezende@gmail.com";

        // Função de validação de horário (Fuso Bahia)
        function validarJanela() {
            const d = new Date(new Date().toLocaleString("en-US", {timeZone: "America/Bahia"}));
            const dia = d.getDay(), hora = d.getHours();
            return (dia === 3 && hora >= 5) || (dia === 4) || (dia === 5 && hora < 22);
        }

        async function carregarListaPresenca() {
            const container = document.getElementById('painel-lista-presenca');
            const { data: jogadores } = await db.from('jogadores').select('*');
            const { data: convidados } = await db.from('convidados').select('id, nome, j_id:jogador_id, jogadores(nome)');

            if (Logado && Logado.email.toLowerCase().trim() === ADMIN_EMAIL) {
                document.getElementById('painel-controle-admin').classList.remove('hidden');
                document.getElementById('admin-select-jogador').innerHTML = jogadores.map(j => `<option value="${j.id}">${j.nome}</option>`).join('');
            }

            // Renderiza com validação de administrador e remoção de convidados
            container.innerHTML = `
                <div class="bg-marinho-card p-4 rounded-xl space-y-3">
                    <p class="text-xs font-bold text-green-400">Confirmados (${jogadores.filter(j=>j.presenca==='Confirmado').length + (convidados?.length||0)})</p>
                    <p class="text-sm">${jogadores.filter(j=>j.presenca==='Confirmado').map(j=>j.nome).join(', ')}</p>
                    <div class="flex flex-wrap gap-2 pt-2 border-t border-marinho-light">
                        ${convidados.map(c => `<span class="bg-white/10 px-2 py-1 rounded text-xs flex items-center">${c.nome} (${c.jogadores.nome}) <button onclick="removerConvidado(${c.id})" class="ml-2 text-red-500 font-bold">X</button></span>`).join('')}
                    </div>
                </div>
            `;
        }

        async function removerConvidado(id) { await db.from('convidados').delete().eq('id', id); carregarListaPresenca(); }
        async function forcarStatus(status) { const id = document.getElementById('admin-select-jogador').value; await db.from('jogadores').update({presenca: status}).eq('id', id); carregarListaPresenca(); }

        // Login e Inicialização mantêm a robustez
        document.getElementById('form-login').addEventListener('submit', async (e) => {
            e.preventDefault();
            const { data } = await db.from('jogadores').select('*').eq('email', document.getElementById('login-email').value.trim().toLowerCase()).maybeSingle();
            if (data) {
                Logado = data;
                document.getElementById('tela-login').classList.add('hidden');
                document.getElementById('tela-principal').classList.remove('hidden');
                document.getElementById('menu-inferior').classList.remove('hidden');
                document.getElementById('btn-logout').classList.remove('hidden');
                if(validarJanela()) document.getElementById('btn-vou').disabled = false;
                carregarListaPresenca();
            } else { alert("E-mail não autorizado."); }
        });

        // Eventos e Navegação
        document.getElementById('btn-vou').addEventListener('click', async () => { await db.from('jogadores').update({presenca: 'Confirmado'}).eq('id', Logado.id); document.getElementById('bloco-convidado').classList.remove('hidden'); carregarListaPresenca(); });
        document.getElementById('btn-naovou').addEventListener('click', async () => { await db.from('jogadores').update({presenca: 'Dispensado'}).eq('id', Logado.id); carregarListaPresenca(); });
        document.getElementById('btn-add-convidado').addEventListener('click', async () => { await db.from('convidados').insert({nome: document.getElementById('input-convidado').value, jogador_id: Logado.id}); document.getElementById('input-convidado').value = ''; carregarListaPresenca(); });
        
        ['jogadores', 'financeiro', 'presenca', 'votacao'].forEach(aba => document.getElementById('btn-aba-'+aba).addEventListener('click', () => {
            ['jogadores', 'financeiro', 'presenca', 'votacao'].forEach(a => document.getElementById('aba-'+a).classList.add('hidden'));
            document.getElementById('aba-'+aba).classList.remove('hidden');
        }));
        
        document.getElementById('btn-admin-add-jogador').addEventListener('click', async () => {
            await db.from('jogadores').insert({nome: document.getElementById('admin-novo-nome').value, email: document.getElementById('admin-novo-email').value, categoria: document.getElementById('admin-nova-cat').value, presenca: 'Sem Resposta'});
            carregarListaPresenca();
        });
        
        document.getElementById('btn-admin-reset').addEventListener('click', async () => {
            await db.from('jogadores').update({presenca: 'Sem Resposta'}).neq('id', 0);
            await db.from('convidados').delete().neq('id', 0);
            carregarListaPresenca();
        });

        document.getElementById('btn-logout').addEventListener('click', () => location.reload());
    </script>
</body>
</html>
